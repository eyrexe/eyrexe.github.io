<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">

    <title>Erik Çiçeği</title>
    <style>
        body { 
            background-color: #0b0c10;

            padding-top: 60px; 
            margin: 0;
        }
        .ana-kutu { 
            background-color: #1f2833; 
            padding: 40px 20px; 
            width: 85%; 
            max-width: 500px;

            border-radius: 12px; 
            box-shadow: 0px 8px 24px rgba(0,0,0,0.3);
            border-top: 4px solid #66fcf1;
        }
        h1 { 
            font-size: 36px; 
            color: #66fcf1; 
            margin-bottom: 5px;

        }
        p { 
            font-size: 16px; 
            color: #45f3ff;
            font-weight: 500;
            margin-bottom: 20px;
        }
        .site-resim {
            width: 100%;
            max-width: 300px;
            border-radius: 8px;

            box-shadow: 0px 4px 12px rgba(0,0,0,0.5);

    <div class="ana-kutu">

        <!-- Yüklediğin şanlı resim tam buraya oturuyor -->
